name: Ruff

on:
  push:
    paths:
      - "ofd/**/*.py"
  pull_request:
    paths:
      - "ofd/**/*.py"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ofd/"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ofd/"
