name: Style data

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'stores/**'
      - 'schemas/**'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  style_data:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Assign canonical UUIDs
        # Backfill a canonical UUIDv4 into every entity that was merged without one
        # (manual or webui contributions leave the uuid field empty). Runs before
        # style_data so the new field is sorted into schema order.
        run: python -m ofd uuid assign

      - name: Verify UUIDs
        # Every entity must now have a valid, unique UUID (presence is required by default).
        run: python -m ofd uuid check

      - name: Run style_data
        run: python -m ofd script style_data

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ stores/
          git diff --cached --quiet || (git commit -m "Assign UUIDs and style data" && git push)
